# refreshInterval = 30s: du nhanh de pass yeu cau "< 60s", du cham de
# khong spam nguon (AWS Secrets Manager tinh tien theo API call neu dung
# provider thuc; voi fake provider khong anh huong gi nhung van giu logic
# dung cho production).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: demo
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: fake-store
    kind: SecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: db-password
