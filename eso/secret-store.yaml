# SecretStore dung provider "fake" cua ESO - khong can AWS credentials thuc.
# Van chung minh dung pattern: doi gia tri o day (commit git) = doi gia tri
# "tren nguon" (AWS Secrets Manager trong thuc te), ESO se tu sync xuong
# K8s Secret theo refreshInterval cua ExternalSecret, khong restart pod.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: fake-store
  namespace: demo
spec:
  provider:
    fake:
      data:
        - key: db-password
          value: "initial-password-v1"
          version: v1
