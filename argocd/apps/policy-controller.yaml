# ArgoCD App: Deploy Sigstore Policy Controller (admission webhook)
# Sync wave som nhat: ClusterImagePolicy can CRD + webhook nay san sang truoc
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: policy-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: https://sigstore.github.io/helm-charts
    chart: policy-controller
    targetRevision: 0.10.6
  destination:
    server: https://kubernetes.default.svc
    namespace: cosign-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    # policy-controller (Knative-style) co 1 reconciler rieng tu ghi lai toan bo
    # noi dung webhooks[] (khong chi caBundle) cho 2 webhook ten "policy.sigstore.dev"
    # (defaulting + validating cho ConfigMap-driven policy) - GitOps khong "thang"
    # duoc reconciler nay, nen bo qua toan bo /webhooks de tranh OutOfSync gia.
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jsonPointers:
        - /webhooks
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields
